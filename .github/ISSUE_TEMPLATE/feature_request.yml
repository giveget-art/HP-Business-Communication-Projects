name: Feature Request
description: Suggest a new feature
title: "[FEATURE] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature!

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      placeholder: What feature would you like?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      placeholder: Why do we need this?
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      placeholder: How would this be used?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true
