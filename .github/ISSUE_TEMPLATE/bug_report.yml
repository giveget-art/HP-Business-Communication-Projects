name: Bug Report
description: Report a bug or issue
title: "[BUG] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue! Please fill out the form below to help us understand and fix the problem.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is happening?
      placeholder: Describe the issue you're experiencing...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
      placeholder: Describe what you expected to happen...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. First step
        2. Second step
        3. Third step
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Message
      description: Paste the exact error message
      placeholder: Paste error stack trace...
      render: shell

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., macOS 13.0, Ubuntu 22.04
    validations:
      required: true

  - type: input
    id: android_version
    attributes:
      label: Android Version
      placeholder: e.g., Android 14
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
