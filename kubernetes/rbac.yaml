apiVersion: rbac.authorization.k8s.io/v1
kind: ServiceAccount
metadata:
  name: hp-communication-app
  namespace: hp-communication
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ServiceAccount
metadata:
  name: hp-communication-ui
  namespace: hp-communication
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hp-communication-role
  namespace: hp-communication
rules:
- apiGroups: [""]
  resources: [configmaps]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [secrets]
  verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hp-communication-app-binding
  namespace: hp-communication
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hp-communication-role
subjects:
- kind: ServiceAccount
  name: hp-communication-app
  namespace: hp-communication
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hp-communication-ui-binding
  namespace: hp-communication
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hp-communication-role
subjects:
- kind: ServiceAccount
  name: hp-communication-ui
  namespace: hp-communication
