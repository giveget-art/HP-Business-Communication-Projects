apiVersion: v1
kind: Service
metadata:
  name: hp-communication-app-service
  namespace: hp-communication
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: hp-communication-app
---
apiVersion: v1
kind: Service
metadata:
  name: hp-communication-ui-service
  namespace: hp-communication
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: hp-communication-ui
