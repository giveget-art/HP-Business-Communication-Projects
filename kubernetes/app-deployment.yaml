apiVersion: apps/v1
kind: Deployment
metadata:
  name: hp-communication-app
  namespace: hp-communication
  labels:
    app: hp-communication-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hp-communication-app
  template:
    metadata:
      labels:
        app: hp-communication-app
    spec:
      serviceAccountName: hp-communication-app
      containers:
      - name: app
        image: registry.example.com/hp-communication/app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: ENVIRONMENT
          value: production
        - name: LOG_LEVEL
          value: INFO
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
