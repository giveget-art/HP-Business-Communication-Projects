apiVersion: apps/v1
kind: Deployment
metadata:
  name: hp-communication-ui
  namespace: hp-communication
  labels:
    app: hp-communication-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hp-communication-ui
  template:
    metadata:
      labels:
        app: hp-communication-ui
    spec:
      serviceAccountName: hp-communication-ui
      containers:
      - name: ui
        image: registry.example.com/hp-communication/ui:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
        env:
        - name: ENVIRONMENT
          value: production
        - name: LOG_LEVEL
          value: INFO
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
